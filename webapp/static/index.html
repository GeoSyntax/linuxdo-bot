<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="app.css">
</head>
<body>
<div class="app">

      <span class="brand-sub">合规采集 · AI 清洗</span>

      <button class="nav-item" data-view="pipeline">离线流水线</button>

      <span id="provider-tag" class="tag">provider: —</span>

  <main class="main">
    <header class="topbar">
      <h1 id="view-title">概览</h1>
      <span id="view-desc" class="desc"></span>

    <div class="content" id="content"><!-- views injected --></div>
